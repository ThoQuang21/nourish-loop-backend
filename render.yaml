# ============================================================
# Render Blueprint cho Nourish-Loop Backend
# Deploy: đẩy repo lên GitHub -> Render Dashboard -> New -> Blueprint -> chọn repo.
# Render sẽ tạo 1 web service + 1 Postgres theo file này.
# ============================================================
services:
  - type: web
    name: nourish-loop-backend
    runtime: node
    plan: free
    # Nếu backend nằm trong subfolder của repo, đặt rootDir tương ứng:
    # rootDir: nourish-loop-backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: nourish-loop-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false # điền URL frontend sau khi deploy FE

databases:
  - name: nourish-loop-db
    plan: free
    databaseName: nourish_loop
    user: nourish_loop
